name: Build MineMc Android

on:
  push:
    branches:
      - "dev"
      - "main"
      - "indexing"
      - "release/**"
    paths-ignore:
      - '**.md'
      - '**.json'
      - '.github/workflows/crowdin_contributors.yml'
  pull_request:
    branches: [ "dev" ]
    paths-ignore:
      - '**.md'
      - '**.json'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_release_apk:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # -----------------------------------------------------------------------
      # 1. Cancel redundant runs on the same branch
      # -----------------------------------------------------------------------
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      # -----------------------------------------------------------------------
      # 2. Checkout (full history for versioning)
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # 3. Java 17
      # -----------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'adopt'

      # -----------------------------------------------------------------------
      # 4. Android SDK + NDK + CMake
      # -----------------------------------------------------------------------
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install \
            "ndk;27.2.12479018" \
            "cmake;3.22.1"

      # -----------------------------------------------------------------------
      # 5. Gradle cache
      # -----------------------------------------------------------------------
      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-v2-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -----------------------------------------------------------------------
      # 6. Wrapper permissions + local.properties
      # -----------------------------------------------------------------------
      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # -----------------------------------------------------------------------
      # 7. Build debug APK (always)
      # -----------------------------------------------------------------------
      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      # -----------------------------------------------------------------------
      # 8. Build release APK
      # -----------------------------------------------------------------------
      - name: Assemble Release APK
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.2.12479018

      # -----------------------------------------------------------------------
      # 9. Get version / build info
      # -----------------------------------------------------------------------
      - name: Get version name
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts || echo "0.1.0")
          echo "name=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # -----------------------------------------------------------------------
      # 10. Upload debug APK as workflow artifact (always available)
      # -----------------------------------------------------------------------
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: minemc-debug-build-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # -----------------------------------------------------------------------
      # 11. Create GitHub Release with release APK (on push to main/release/*)
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}-build.${{ github.run_number }}
          name: "v${{ steps.version.outputs.name }} (Build #${{ github.run_number }})"
          body: |
            **Automated MineMc build**

            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Run: #${{ github.run_number }}

            ### What's included
            - Debug APK (attached above as workflow artifact)
            - Release APK (below — unsigned, for sideloading)

            > **Note:** The release APK is built with R8 minification but is not yet signed with a release key.
            > For Play Store distribution, sign it with your keystore before uploading.
          draft: false
          prerelease: true
          files: |
            app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 12. Lint (non-blocking)
      # -----------------------------------------------------------------------
      - name: Run Lint
        run: ./gradlew lintDebug --continue || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.run_number }}
          path: app/build/reports/lint-results-debug.html
          retention-days: 7
